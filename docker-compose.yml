# Galaxy Vast AI Trading Platform
# All services with resource limits, healthchecks, restart policies,
# and explicit Docker network for isolation.
# Fix: added galaxyvast_net network — services previously used default bridge
# (no isolation, no DNS-based service discovery guarantee)

networks:
  galaxyvast_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  redis:
    image: redis:7.4-alpine
    restart: on-failure:3
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - galaxyvast_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - galaxyvast_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: on-failure:3
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - galaxyvast_net
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - galaxyvast_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "3000:80"
    networks:
      - galaxyvast_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
